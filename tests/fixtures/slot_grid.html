<!-- Trimmed capture of the accesso dateTime page slot grid (2026-06-19).
     Real markup: gap-tile[data-cy^=dt_timeSlot] > span[slot=title] + span[slot=price]. -->
<div class="date-time__tiles">
  <gap-tile data-cy="dt_timeSlot-0" class="gap-tile gap-palette--secondary ng-scope" aria-disabled="false">
    <span slot="title" class="ng-binding">3:30 PM - 4:00 PM</span>
    <span slot="price" class="ng-binding ng-scope">£39.00</span>
  </gap-tile>
  <gap-tile data-cy="dt_timeSlot-1" class="gap-tile gap-palette--secondary ng-scope" aria-disabled="false">
    <span slot="title" class="ng-binding">4:30 PM - 5:00 PM</span>
    <span slot="price" class="ng-binding ng-scope">£37.00</span>
  </gap-tile>
  <gap-tile data-cy="dt_timeSlot-2" class="gap-tile gap-palette--secondary ng-scope --best-value" aria-disabled="false">
    <span slot="title" class="ng-binding">6:30 PM - 7:00 PM</span>
    <span slot="price" class="ng-binding ng-scope">£33.00</span>
  </gap-tile>
  <gap-tile data-cy="dt_timeSlot-3" class="gap-tile gap-palette--secondary ng-scope" aria-disabled="true">
    <span slot="title" class="ng-binding strike-through">7:30 PM - 8:00 PM</span>
    <span slot="price" class="ng-binding ng-scope">Sold out</span>
  </gap-tile>
</div>
